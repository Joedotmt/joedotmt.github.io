<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNote</title>
    <link href="https://cdn.jsdelivr.net/npm/beercss@3.9.7/dist/cdn/beer.min.css" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.9.7/dist/cdn/beer.min.js"></script>


    <link rel="stylesheet" href="style.css?v=20">
    <style id="custom-css"></style>
    <script>
        (() => {
            try {
                document.getElementById('custom-css').textContent = localStorage.getItem('jnote.customCss.v1') || '';
            } catch (err) {
                console.warn('Could not apply custom CSS:', err);
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
</head>

<body class="greencolor">
    <div class="overlay" id="overlay"></div>

    <div class="encryption-modal" id="encryption-modal" role="dialog" aria-modal="true"
        aria-labelledby="encryption-title">
        <form class="encryption-modal-content" id="encryption-form" autocomplete="off">
            <h2 id="encryption-title">Set decryption key</h2>
            <p class="encryption-copy">Enter the key to be used to decrypt your notes.</p>
            <p class="encryption-warning">If you forget this key, your notes cannot be recovered.</p>
            <div class="field border label encryption-field">
                <input type="password" id="encryption-passphrase" autocomplete="current-password" required>
                <label for="encryption-passphrase">Encryption key</label>
            </div>

            <p class="encryption-error" id="encryption-error" hidden></p>
            <div class="encryption-actions">
                <button class="btn-primary encryption-submit" type="submit" data-remember-device="true">Unlock and Remember</button>
                <button class="btn-secondary encryption-submit" type="submit" data-remember-device="false">Unlock Once</button>
            </div>
        </form>
    </div>

    <div class="modal" id="folder-modal">
        <div class="modal-content">
            <h2 class="modal-header" id="modal-header">Select Folder</h2>
            <div class="folder-selection" id="folder-selection"></div>
            <div class="field border label">
                <input type="text" id="custom-folder-name">
                <label>Other</label>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="folder-modal-cancel">Cancel</button>
                <button class="btn-primary" id="folder-modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <div class="app-container">

        <!-- Hamburger Menu for Mobile -->
        <button class="hamburger-btn" id="hamburger-btn">
            <svg height="24" viewBox="0 0 24 24" width="24" fill="currentColor">
                <path d="M0 0h24v24H0z" fill="none" />
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
        </button>

        <!-- Folders Panel -->
        <div id="folders-container" class="folders-container">
            <div class="sidebar-header">Folders</div>
            <div class="sidebar folders-panel" id="folders-panel">
                <ul class="folder-list">
                    <div style="display: contents;" id="folder-list"></div>
                </ul>
            </div>
        </div>

        <!-- Notes List Panel -->
        <div class="nlppppp">
            <div class="notes-header" id="current-folder-title">Notes</div>
            <ul style="margin-bottom: 50px;" class="folder-list" id="notes-list">
                <li class="empty-state">Select a folder</li>
            </ul>
            <button class="btn-primary ripple" id="btn-create-note">New Note</button>
        </div>

        <!-- Note Detail Panel -->
        <div id="detail-container" class="detail-container">
            <button class="close-detail-btn" id="close-detail-btn" title="Close">
                <svg height="24" viewBox="0 0 24 24" width="24" fill="currentColor">
                    <path
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </button>
            <div id="note-detail">
                <p class="empty">Select a note to view</p>
            </div>
        </div>

    </div>

    <div class="sync-app-bar" id="sync-app-bar">
        <div class="sync-status-group">
            <div class="sync-spinner" aria-hidden="true"></div>
            <i class="sync-check" aria-hidden="true">check</i>
            <span id="sync-status-text">Pushing to cloud...</span>
        </div>
        <button class="app-bar-icon-btn" id="settings-btn" type="button" aria-label="Open settings" title="Settings">
            <i aria-hidden="true">settings</i>
        </button>
    </div>

    <dialog class="settings-dialog" id="settings-dialog" aria-labelledby="settings-dialog-title">
        <form method="dialog" class="settings-dialog-content">
            <div class="settings-dialog-header">
                <h2 id="settings-dialog-title">Settings</h2>
                <button class="icon-dialog-btn" type="submit" aria-label="Close settings" title="Close">
                    <i aria-hidden="true">close</i>
                </button>
            </div>
            <button class="settings-row-button" id="open-custom-css-dialog" type="button">
                <i aria-hidden="true">code</i>
                <span>Custom CSS</span>
            </button>
            <button class="settings-row-button" id="forget-remembered-device" type="button">
                <i aria-hidden="true">lock</i>
                <span>Forget remembered device</span>
            </button>
        </form>
    </dialog>

    <dialog class="settings-dialog custom-css-dialog" id="custom-css-dialog" aria-labelledby="custom-css-dialog-title">
        <form method="dialog" class="settings-dialog-content">
            <div class="settings-dialog-header">
                <h2 id="custom-css-dialog-title">Custom CSS</h2>
                <button class="icon-dialog-btn" type="submit" aria-label="Close custom CSS" title="Close">
                    <i aria-hidden="true">close</i>
                </button>
            </div>
            <textarea id="custom-css-input" spellcheck="false" placeholder="body { }"></textarea>
            <div class="settings-dialog-actions">
                <button class="btn-secondary" id="clear-custom-css" type="button">Clear</button>
                <button class="btn-primary" id="save-custom-css" type="button">Save</button>
            </div>
        </form>
    </dialog>

    <!-- Overlay for Mobile Navigation -->
    <div class="mobile-overlay" id="mobile-overlay"></div>


    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="app.js?v=21"></script>
</body>

</html>
